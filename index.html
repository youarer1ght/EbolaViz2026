<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 年埃博拉疫情时空可视化分析系统</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Title Bar -->
    <header id="titlebar">
      <h1>🦠 2026 年埃博拉疫情时空可视化分析系统</h1>
      <div id="controls">
        <button id="btn-play" title="播放动画">▶ 播放</button>
        <button id="btn-pause" disabled title="暂停">⏸ 暂停</button>
        <button id="btn-prev" title="上一天" disabled>◀ 上一天</button>
        <button id="btn-next" title="下一天" disabled>▶ 下一天</button>
        <button id="btn-reset" title="重置所有筛选">↺ 重置</button>
        <input type="date" id="date-picker" title="跳转到指定日期" style="padding:3px 6px;font-size:0.8rem;border:1px solid #ccc;border-radius:4px;background:#fff;">
        <span id="current-date"></span>
        <span id="data-source" style="font-size:0.7rem;color:#999;margin-left:8px;"></span>
      </div>
    </header>

    <!-- View 1: Spatiotemporal Heatmap (split: overview + province detail) -->
    <section id="view-heatmap" class="chart-container">
      <h2>① 疫情时空热力图</h2>
      <div class="heatmap-split">
        <div id="chart-heatmap" class="chart"></div>
        <div class="chart chart-detail-wrapper">
          <div id="chart-heatmap-detail"></div>
          <div class="detail-placeholder">
            <div class="placeholder-icon">🗺️</div>
            <div>👆 点击左侧地图省份<br>查看卫生区详情</div>
          </div>
        </div>
      </div>
    </section>

    <!-- View 2: Timeline -->
    <section id="view-timeline" class="chart-container">
      <h2>② 时序趋势图</h2>
      <div id="chart-timeline" class="chart"></div>
    </section>

    <!-- View 3: Parallel Coordinates -->
    <section id="view-parallel" class="chart-container">
      <h2>③ 多因素关联分析（平行坐标图）</h2>
      <div id="chart-parallel" class="chart"></div>
    </section>

    <!-- View 4: Policy Timeline -->
    <section id="view-policy" class="chart-container">
      <h2>④ 防控政策时间轴</h2>
      <div id="chart-policy" class="chart"></div>
    </section>

    <!-- View 5: Detail Panel -->
    <section id="view-detail" class="chart-container">
      <h2>⑤ 详情与统计面板</h2>
      <div id="chart-detail" class="chart"></div>
    </section>
  </div>

  <script type="module" src="js/main.js?t=20260620"></script>
</body>
</html>
